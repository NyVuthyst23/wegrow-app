    <style>
        body {
            font-family: 'Battambang', 'Siemreap', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        .font-khmer {
            font-family: 'Battambang', sans-serif;
        }

        .custom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 12.5px;
        }

        .custom-table th {
            background: linear-gradient(180deg, #16a34a 0%, #15803d 100%) !important;
            color: white !important;
            padding: 11px 8px;
            border-right: 1px solid #166534;
            border-bottom: 1px solid #166534;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 700;
            text-align: left;
        }

        .custom-table th:first-child {
            border-left: 1px solid #166534;
            border-top-left-radius: 8px;
        }

        .custom-table th:last-child {
            border-top-right-radius: 8px;
        }

        .custom-table td {
            padding: 10px 8px;
            border-right: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
            color: #374151;
            vertical-align: middle;
            background-color: white;
        }

        .text-center-clean {
            text-align: center !important;
        }

        .cell-center {
            text-align: center !important;
            vertical-align: middle !important;
        }

        .action-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .followup-print-title {
            text-align: center;
        }

        .custom-table td:first-child {
            border-left: 1px solid #e5e7eb;
        }

        .custom-table tr:nth-child(even) td {
            background-color: #fafafa;
        }

        .custom-table tr:hover td {
            background-color: #eff6ff;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }

        .badge-aba {
            background-color: #005eb8;
            color: white;
        }

        .badge-ac {
            background-color: #dcae1d;
            color: white;
        }

        .badge-wing {
            background-color: #8dc63f;
            color: white;
        }

        .badge-motors {
            background-color: #6b7280;
            color: white;
        }

        .badge-other {
            background-color: #af002e;
            color: white;
        }

        .badge-new {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .badge-old {
            background-color: #fef9c3;
            color: #854d0e;
            border: 1px solid #fde047;
        }

        .badge-manager-1 {
            background-color: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }

        .badge-manager-2 {
            background-color: #fce7f3;
            color: #be185d;
            border: 1px solid #fbcfe8;
        }

        .date-cell {
            white-space: nowrap !important;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
        }

        .date-cell-tight {
            white-space: nowrap !important;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
            font-size: 12px;
            line-height: 1.2;
            display: inline-block;
        }

        .report-card {
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            border: 1px solid #e5e7eb;
            background: white;
        }

        .section-title {
            letter-spacing: 0.2px;
        }

        .soft-panel {
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            border: 1px solid #e2e8f0;
        }

        .expiry-badge-strong {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 10px;
            background: linear-gradient(180deg, #fef2f2 0%, #fee2e2 100%);
            color: #b91c1c !important;
            border: 1px solid #fecaca;
            font-weight: 700;
            box-shadow: 0 1px 3px rgba(239, 68, 68, 0.10);
            white-space: nowrap;
        }

        .ticket-icon-btn {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            font-size: 18px;
            line-height: 1;
            font-weight: 700;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ticket-icon-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
        }

        .ticket-icon-called {
            background-color: #ecfdf5;
            color: #15803d;
            border-color: #bbf7d0;
        }

        .ticket-icon-not-called {
            background-color: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        .print-inline-status {
            display: none;
            font-size: 18px;
            line-height: 1;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .capture-mode {
            background-color: white !important;
            padding: 20px !important;
            width: 1800px !important;
            max-width: none !important;
        }

        /* Page Filter Tabs */
        .page-tab {
            transition: all 0.2s;
            white-space: nowrap;
        }

        .page-tab.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
        }

        .page-tab:not(.active):hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
        }

        @media print {
            @page {
                margin: 5mm;
                size: landscape;
            }

            body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                background-color: white !important;
                zoom: 95%;
            }

            body,
            html,
            #root,
            .container,
            main {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
            }

            .no-print,
            header,
            nav,
            .bg-blue-900,
            .hidden-print,
            .shadow-lg,
            .shadow-md,
            .shadow-sm,
            .page-filters {
                display: none !important;
            }

            .print-container,
            .print-container * {
                visibility: visible !important;
            }

            .print-container {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                display: block !important;
                visibility: visible !important;
                overflow: visible !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
            }

            body * {
                visibility: hidden !important;
            }

            .followup-print-container,
            .followup-print-container *,
            .print-container,
            .print-container * {
                visibility: visible !important;
            }

            .followup-print-container {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                display: block !important;
                overflow: visible !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
            }

            .report-card,
            .overflow-x-auto,
            table,
            thead,
            tbody,
            tr,
            td,
            th {
                overflow: visible !important;
            }

            thead {
                display: table-header-group !important;
            }

            tfoot {
                display: table-footer-group !important;
            }

            tr,
            td,
            th {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .overflow-x-auto {
                overflow: visible !important;
                display: block !important;
                width: 100% !important;
            }

            .custom-table {
                width: 100% !important;
                table-layout: auto !important;
                border: 1px solid #000 !important;
                border-collapse: collapse !important;
            }

            .custom-table th {
                background-color: #16a34a !important;
                color: white !important;
                border: 1px solid #000 !important;
                font-size: 8.8pt !important;
                padding: 7px 4px !important;
                text-align: left !important;
            }

            .custom-table td {
                border: 1px solid #000 !important;
                font-size: 8.8pt !important;
                padding: 5px 4px !important;
                color: black !important;
                white-space: normal !important;
                word-wrap: break-word !important;
                background: white !important;
            }

            .custom-table td:nth-child(1) {
                width: 65px;
                white-space: nowrap !important;
            }

            .date-cell,
            .date-cell-tight {
                white-space: nowrap !important;
                font-size: 8.5pt !important;
            }

            .text-center-clean,
            .cell-center {
                text-align: center !important;
            }

            .print-only {
                display: block !important;
                margin-top: 20px;
                page-break-inside: avoid;
            }

            .print-inline-status {
                display: inline-block !important;
            }
        }
    </style>
</head>

        const CAMBODIA_PROVINCES = ["ភ្នំពេញ", "កណ្តាល", "សៀមរាប", "បន្ទាយមានជ័យ", "បាត់ដំបង", "កំពង់ចាម", "កំពង់ឆ្នាំង", "កំពង់ស្ពឺ", "កំពង់ធំ", "កំពត", "កែប", "កោះកុង", "ក្រចេះ", "មណ្ឌលគិរី", "ឧត្តរមានជ័យ", "ប៉ៃលិន", "ព្រះសីហនុ", "ព្រះវិហារ", "ព្រៃវែង", "ពោធិ៍សាត់", "រតនគិរី", "សៀមរាប", "ស្ទឹងត្រែង", "ស្វាយរៀង", "តាកែវ", "ត្បូងឃ្មុំ"].sort();

        const toLocalISO = (date) => `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
        const getTodayLocal = () => toLocalISO(new Date());
        const getWeekRangeFromDate = (dateStr) => {
            const base = /^\d{4}-\d{2}-\d{2}$/.test(String(dateStr || '')) ? new Date(dateStr + 'T00:00:00') : new Date();
            const day = base.getDay(); // 0 Sun ... 1 Mon
            const diffToMonday = day === 0 ? -6 : 1 - day;
            const monday = new Date(base);
            monday.setDate(base.getDate() + diffToMonday);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            return {
                start: toLocalISO(monday),
                end: toLocalISO(sunday)
            };
        };
        const addDaysToLocalDate = (dateStr, days) => {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr || ''))) return getTodayLocal();
            const [year, month, day] = String(dateStr).split('-').map(Number);

        const createFollowUpSchedule = (qty, startDate) => {

            // Rule:
            // 1 box -> every 7 days
            // 2+ boxes -> every 14 days
            const interval = quantity >= 2 ? 14 : 7;

            const followUpDates = [];
            for (let dayOffset = interval; dayOffset <= duration; dayOffset += interval) {
                followUpDates.push(addDaysToLocalDate(startDate, dayOffset));
            }

            return {
                duration,
                endDate,
                followUpDates,
                interval,
                firstFollowUpDate: followUpDates[0] || ''
            };

        const hashPassword = async (password, saltBase64 = null) => {
            ensureCryptoSupport();
            const encoder = new TextEncoder();
            const salt = saltBase64 ? base64ToUint8(saltBase64) : window.crypto.getRandomValues(new Uint8Array(16));

            const derivedBits = await window.crypto.subtle.deriveBits(

        const callGemini = async (apiKey, prompt, imageBase64 = null) => {

            const parts = [{ text: prompt }];
            if (imageBase64) {

                const mimeMatch = imageBase64.match(/data:([a-zA-Z0-9]+\/[a-zA-Z0-9-.+]+).*,.*/);
                const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
                parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            let response;
            try {
                response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${encodeURIComponent(trimmedKey)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                            <button onClick={onConfirm} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 text-sm font-medium">យល់ព្រម (Confirm)</button>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ apiKey, setApiKey, logo, setLogo, pageList, setPageList, sales, setSales, onClose, onAlert, onToast }) => {
            const [tempKey, setTempKey] = useState(apiKey);
            const [newPage, setNewPage] = useState('');
            const backupInputRef = useRef(null);

            const handleSave = () => {
                const trimmedKey = tempKey.trim();
                setApiKey(trimmedKey);
                if (trimmedKey) sessionStorage.setItem(STORAGE_KEYS.SESSION_API_KEY, trimmedKey);
                else sessionStorage.removeItem(STORAGE_KEYS.SESSION_API_KEY);
                onToast('បានរក្សាទុកការកំណត់រួចរាល់!');
                onClose();
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 1024 * 1024) {
                    onAlert('Logo ធំពេក។ សូមប្រើ file តូចជាង 1MB។');
                    e.target.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onloadend = () => {
                    setLogo(reader.result);
                    localStorage.setItem(STORAGE_KEYS.LOGO, reader.result);
                };
                reader.readAsDataURL(file);
            };

            const handleRemoveLogo = () => {
                setLogo('');
                localStorage.removeItem(STORAGE_KEYS.LOGO);
            };

            const handleAddPage = () => {
                const trimmedPage = newPage.trim();
                if (!trimmedPage) return;
                if (pageList.includes(trimmedPage)) {
                    onAlert('ឈ្មោះផេកនេះមានរួចហើយ។');
                    return;
                }
                const updated = [...pageList, trimmedPage];
                setPageList(updated);
                localStorage.setItem(STORAGE_KEYS.PAGE_LIST, JSON.stringify(updated));
                setNewPage('');
                onToast('បានបន្ថែមផេកថ្មី!');
            };

            const handleRemovePage = (page) => {
                if (pageList.length === 1) {
                    onAlert('ត្រូវមានយ៉ាងហោចណាស់ 1 ផេកក្នុងប្រព័ន្ធ។');
                    return;
                }
                const usedCount = sales.filter(sale => sale.pageName === page).length;
                if (usedCount > 0) {
                    onAlert(`មិនអាចលុបផេកនេះបានទេ ព្រោះមានទិន្នន័យ ${usedCount} record កំពុងប្រើវា។`);
                    return;
                }
                if (confirm('តើអ្នកចង់លុបឈ្មោះផេកនេះចេញមែនទេ?')) {
                    const updated = pageList.filter(p => p !== page);
                    setPageList(updated);
                    localStorage.setItem(STORAGE_KEYS.PAGE_LIST, JSON.stringify(updated));
                }
            };

            const handleExportBackup = () => {
                const payload = {
                    version: 2,
                    exportedAt: new Date().toISOString(),
                    pageList,
                    sales
                };
                downloadTextFile(`we_grow_backup_${getTodayLocal()}.json`, JSON.stringify(payload, null, 2));
                onToast('បានទាញយក Backup JSON!');
            };

            const handleImportBackup = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const payload = safeJsonParse(String(reader.result || ''), null);
                        if (!payload || !Array.isArray(payload.sales)) {
                            throw new Error('Invalid backup');
                        }
                        const importedPages = Array.isArray(payload.pageList) && payload.pageList.length
                            ? [...new Set(payload.pageList.map(item => String(item || '').trim()).filter(Boolean))]
                            : [...pageList];
                        const sanitizedSales = payload.sales.map(item => ({
                            ...item,
                            id: item.id || (window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}_${Math.random().toString(16).slice(2)}`),
                            date: item.date || getTodayLocal(),
                            customerName: item.customerName || '',
                            phone: item.phone || '',
                            province: item.province || 'ភ្នំពេញ',
                            district: item.district || '',
                            commune: item.commune || '',
                            village: item.village || '',
                            pageName: normalizePageName(item.pageName, importedPages),
                            managerName: normalizeManagerName(item.managerName),
                            price: Number(item.price) || 0,
                            quantity: Number(item.quantity) || 1,
                            paymentMethod: PAYMENT_METHODS.includes(item.paymentMethod) ? item.paymentMethod : 'ABA',
                            customerType: item.customerType === 'ចាស់' ? 'ចាស់' : 'ថ្មី',
                            source: SOURCES.includes(item.source) ? item.source : 'Page',
                            delivery: DELIVERIES.includes(item.delivery) ? item.delivery : 'J&T',
                            followUpDates: Array.isArray(item.followUpDates) ? item.followUpDates : createFollowUpSchedule(item.quantity, item.date || getTodayLocal()).followUpDates,
                            endDate: item.endDate || createFollowUpSchedule(item.quantity, item.date || getTodayLocal()).endDate,
                            duration: Number(item.duration) || createFollowUpSchedule(item.quantity, item.date || getTodayLocal()).duration
                        }));
                        setPageList(importedPages);
                        localStorage.setItem(STORAGE_KEYS.PAGE_LIST, JSON.stringify(importedPages));
                        setSales(sanitizedSales);
                        onToast('បាន Import backup ជោគជ័យ!');
                        onClose();
                    } catch (error) {
                        console.error(error);
                        onAlert('Backup file មិនត្រឹមត្រូវ ឬខូច។');
                    } finally {
                        e.target.value = '';
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white p-6 rounded-lg shadow-xl w-[500px] max-h-[90vh] overflow-y-auto">
                        <h3 className="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2"><Icons.Settings size={22} className="text-gray-700" /> ការកំណត់ប្រព័ន្ធ (Settings)</h3>

                        <div className="mb-6 border-b pb-4">
                            <label className="block text-xs font-bold text-gray-700 mb-2 flex items-center gap-1"><Icons.Facebook size={14} className="text-blue-600" /> គ្រប់គ្រងឈ្មោះផេក (Manage Pages)</label>
                            <div className="flex gap-2 mb-2">
                                <input type="text" placeholder="បញ្ចូលឈ្មោះផេកថ្មី..." value={newPage} onChange={e => setNewPage(e.target.value)} className="flex-1 p-2 border rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none" />
                                <button onClick={handleAddPage} className="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-green-700">បន្ថែម</button>
                            </div>
                            <div className="flex flex-wrap gap-2 mt-2">
                                {pageList.map((page, idx) => (
                                    <div key={idx} className="bg-blue-50 border border-blue-200 text-blue-800 px-2 py-1 rounded text-xs flex items-center gap-2">
                                        {page}
                                        <button onClick={() => handleRemovePage(page)} className="text-red-500 hover:text-red-700 font-bold">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="mb-4 border-b pb-4">
                            <label className="block text-xs font-bold text-gray-700 mb-1 flex items-center gap-1"><Icons.Sparkles size={14} className="text-purple-600" /> Gemini AI API Key</label>
                            <input type="password" placeholder="Paste your API Key here..." value={tempKey} onChange={(e) => setTempKey(e.target.value)} className="w-full p-2 border rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                            <p className="text-[10px] text-gray-500 mt-1">សុវត្ថិភាពប្រសើរជាងមុន៖ API Key នឹងរក្សាទុកតែក្នុង session នេះប៉ុណ្ណោះ មិនរក្សាទុកជាប់ browser ទេ។</p>
                        </div>

                        <div className="mb-4 border-b pb-4">
                            <label className="block text-xs font-bold text-gray-700 mb-1">Backup / Restore</label>
                            <div className="flex gap-2 flex-wrap">
                                <button onClick={handleExportBackup} className="px-3 py-2 bg-emerald-600 text-white rounded text-xs font-bold hover:bg-emerald-700">Export JSON Backup</button>
                                <button onClick={() => backupInputRef.current?.click()} className="px-3 py-2 bg-amber-500 text-white rounded text-xs font-bold hover:bg-amber-600">Import JSON Backup</button>
                                <input ref={backupInputRef} type="file" accept="application/json,.json" className="hidden" onChange={handleImportBackup} />
                            </div>
                            <p className="text-[10px] text-gray-500 mt-2">ណែនាំឲ្យ backup ជាប្រចាំ ដើម្បីការពារទិន្នន័យបាត់ពេល browser clear cache ឬ machine ប្តូរ។</p>
                        </div>

                        <div className="mb-6">
                            <label className="block text-xs font-bold text-gray-700 mb-1 flex items-center gap-1"><Icons.Image size={14} className="text-blue-600" /> Logo ហាង (សម្រាប់ PDF & Header)</label>
                            <div className="flex items-start gap-4">
                                <div className="w-16 h-16 border border-dashed border-gray-300 rounded flex items-center justify-center bg-gray-50 overflow-hidden">{logo ? <img src={logo} alt="Logo Preview" className="w-full h-full object-contain" /> : <span className="text-[10px] text-gray-400">No Logo</span>}</div>
                                <div className="flex-1"><input type="file" accept="image/*" onChange={handleLogoUpload} className="block w-full text-[10px] text-gray-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-[10px] file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-2" />{logo && <button onClick={handleRemoveLogo} className="text-[10px] text-red-600 hover:underline flex items-center gap-1"><Icons.Trash2 size={10} /> លុប Logo</button>}</div>
                            </div>
                        </div>
                        <div className="flex justify-end gap-2 border-t pt-4"><button onClick={onClose} className="px-3 py-1.5 text-gray-600 hover:bg-gray-100 rounded font-medium text-sm">បិទ</button><button onClick={handleSave} className="px-3 py-1.5 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium text-sm">រក្សាទុក</button></div>
                    </div>
                </div>
            );
        };

        const MessageGeneratorModal = ({ onClose, saleData, apiKey, onAlert, onToast }) => {
            const [message, setMessage] = useState('');
            const [loading, setLoading] = useState(false);
            const handleGenerate = async (type) => {
                setLoading(true);
                try {
                    let prompt = '';
                    if (type === 'thankyou') prompt = `Write a polite, friendly, and professional sales confirmation message in Khmer language for a customer named "${saleData.customerName}". They bought ${saleData.quantity} boxes for $${saleData.price}. Delivery via: ${saleData.delivery}. Shop Page: ${saleData.pageName || 'Us'}. Consultant: ${saleData.consultantName || 'Us'}. Manager: ${saleData.managerName || 'We Grow Team'}. The tone should be grateful and encourage them to contact us if they have questions. Use emojis suitable for sales.`;
                    else if (type === 'reminder') prompt = `Write a polite and caring reminder message in Khmer language for customer "${saleData.customerName}". They bought ${saleData.quantity} boxes of ${saleData.diseaseType || 'product'} on ${saleData.date}, which lasts about ${saleData.duration} days. It is now likely running low. Ask gently if they would like to order more to continue their usage. Mention we are from "${saleData.pageName}". Use emojis.`;
                    const result = await callGemini(apiKey, prompt);
                    setMessage(result);
                } catch (error) { onAlert(error.message); } finally { setLoading(false); }
            };
            const copyToClipboard = () => { navigator.clipboard.writeText(message); onToast("បានចម្លងសារទុក (Copied)!"); };
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white p-6 rounded-lg shadow-xl w-[500px]">
                        <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-blue-600"><Icons.MessageCircle size={20} /> AI បង្កើតសារ (Message Generator)</h3>
                        <div className="flex gap-2 mb-4">
                            <button onClick={() => handleGenerate('thankyou')} disabled={loading} className="flex-1 bg-green-100 text-green-700 py-2 rounded hover:bg-green-200 font-medium text-sm flex items-center justify-center gap-1"><Icons.Sparkles size={14} /> សារអរគុណ (Thank You)</button>
                            <button onClick={() => handleGenerate('reminder')} disabled={loading} className="flex-1 bg-orange-100 text-orange-700 py-2 rounded hover:bg-orange-200 font-medium text-sm flex items-center justify-center gap-1"><Icons.Sparkles size={14} /> សាររំលឹក (Reminder)</button>
                        </div>
                        <div className="relative">
                            {loading && <div className="absolute inset-0 flex items-center justify-center bg-white bg-opacity-80"><div className="loader"></div></div>}
                            <textarea rows="6" placeholder="សារដែលបង្កើតរួចនឹងបង្ហាញនៅទីនេះ..." value={message} onChange={(e) => setMessage(e.target.value)} className="w-full p-3 border rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-sm"></textarea>
                        </div>
                        <div className="flex justify-end gap-2"><button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">បិទ</button>{message && <button onClick={copyToClipboard} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-2"><Icons.Copy size={16} /> ចម្លង (Copy)</button>}</div>
                    </div>
                </div>
            );
        };


        const InvoiceModal = ({ onClose, saleData, logo, onToast, onAlert }) => {
            const invoiceRef = useRef(null);

            const formatMoney = (value) => `$${(Number(value) || 0).toFixed(2)}`;
            const formatDisplayDate = (value) => {
                if (!value) return '-';
                const match = String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
                if (match) return `${match[3]}-${match[2]}-${match[1]}`;
                return String(value).replace(/\//g, '-');
            };
            const composeInvoiceText = () => {
                return [
                    `វិក្កយបត្រ / Invoice`,
                    `ថ្ងៃខែ: ${formatDisplayDate(saleData.date)}`,
                    `ឈ្មោះភ្ញៀវ: ${saleData.customerName || '-'}`,
                    `លេខទូរស័ព្ទ: ${saleData.phone || '-'}`,
                    `អាសយដ្ឋាន: ${saleData.location || '-'}`,
                    `ប្រភេទជំងឺ: ${saleData.diseaseType || '-'}`,
                    `ឈ្មោះផេក: ${saleData.pageName || '-'}`,
                    `អ្នកប្រឹក្សា: ${saleData.consultantName || '-'}`,
                    `មេគ្រប់គ្រង: ${saleData.managerName || '-'}`,
                    `ការដឹកជញ្ជូន: ${saleData.delivery || '-'}`,
                    `ការទូទាត់: ${saleData.paymentMethod || '-'}`,
                    `ចំនួន: ${saleData.quantity || 0}`,
                    `តម្លៃសរុប: ${formatMoney(saleData.price)}`,
                    `ចំណាំ: រាល់ការបញ្ជាទិញដែលបានបញ្ជាក់រួច មិនអាចលុបចោលវិញបានទេ។`,
                    `Note: Once an order is confirmed, it cannot be cancelled.`,
                    `អរគុណសម្រាប់ការគាំទ្រ 🙏`
                ].join('\n');
            };

            const renderCanvas = async () => {
                if (typeof html2canvas === 'undefined') throw new Error('html2canvas not loaded');
                if (!invoiceRef.current) throw new Error('Invoice not found');
                return await html2canvas(invoiceRef.current, {
                    scale: 3,
                    backgroundColor: '#ffffff',
                    logging: false,
                    useCORS: true
                });
            };

            const handleCopyText = async () => {
                try {
                    await navigator.clipboard.writeText(composeInvoiceText());
                    onToast('បានចម្លងអត្ថបទ Invoice រួចរាល់!');
                } catch (err) {
                    onAlert('មិនអាចចម្លងអត្ថបទបានទេ');
                }
            };

            const handleDownloadImage = async () => {
                try {
                    const canvas = await renderCanvas();
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = `invoice_${saleData.customerName || 'customer'}_${formatDisplayDate(saleData.date)}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    onToast('បានទាញយក Invoice PNG!');
                } catch (err) {
                    console.error(err);
                    onAlert('បរាជ័យក្នុងការទាញយក Invoice');
                }
            };

            const handleCopyImage = async () => {
                try {
                    const canvas = await renderCanvas();
                    canvas.toBlob(async (blob) => {
                        try {
                            if (!blob) throw new Error('No blob');
                            if (!window.ClipboardItem) throw new Error('Clipboard image not supported');
                            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                            onToast('បានចម្លងរូបភាព Invoice!');
                        } catch (err) {
                            console.error(err);
                            onAlert('មិនអាចចម្លងរូបភាពបានទេ។ សូមប្រើ Download PNG ជំនួស។');
                        }
                    }, 'image/png');
                } catch (err) {
                    console.error(err);
                    onAlert('បរាជ័យក្នុងការបង្កើតរូបភាព Invoice');
                }
            };

            const handlePrintInvoice = () => {
                const content = invoiceRef.current?.outerHTML;
                if (!content) return;
                const w = window.open('', '_blank', 'width=900,height=1200');
                if (!w) {
                    onAlert('Browser បានបិទ popup សូមអនុញ្ញាត popup មុនសិន');
                    return;
                }
                w.document.write(`
                    <html>
                    <head>
                        <title>Invoice</title>
                        <style>
                            body { font-family: Battambang, Arial, sans-serif; background: #f3f4f6; padding: 20px; }
                            .invoice-print-wrap { max-width: 900px; margin: 0 auto; }
                            @media print {
                                body { background: white; padding: 0; }
                            }
                        </style>
                    </head>
                    <body>
                        <div class="invoice-print-wrap">${content}</div>
                    </body>
                    </html>
                `);
                w.document.close();
                w.focus();
                setTimeout(() => {
                    w.print();
                }, 400);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] overflow-hidden">
                        <div className="px-5 py-4 border-b bg-gradient-to-r from-blue-700 to-indigo-700 text-white flex items-center justify-between">
                            <div>
                                <h3 className="text-lg font-bold flex items-center gap-2"><Icons.FileText size={20} /> Invoice Preview</h3>
                                <p className="text-xs text-blue-100">អាចបើកមើល មុនផ្ញើឲ្យភ្ញៀវ</p>
                            </div>
                            <button onClick={onClose} className="bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-lg text-sm">បិទ</button>
                        </div>

                        <div className="p-4 bg-gray-100 overflow-auto max-h-[calc(95vh-170px)]">
                            <div ref={invoiceRef} className="bg-white max-w-3xl mx-auto shadow-lg rounded-xl border border-gray-200 p-6 text-gray-800">
                                <div className="flex justify-between items-start gap-4 border-b pb-4 mb-4">
                                    <div className="flex items-start gap-3">
                                        <div className="w-20 h-20 rounded-xl overflow-hidden border bg-gradient-to-br from-purple-600 to-blue-600 flex items-center justify-center">
                                            {logo ? <img src={logo} alt="Logo" className="w-full h-full object-contain bg-white" /> : <span className="text-white font-bold text-sm">LOGO</span>}
                                        </div>
                                        <div>
                                            <h2 className="text-2xl font-bold text-gray-900">វិក្កយបត្រ <span className="italic text-gray-700">Invoice</span></h2>
                                            <p className="text-sm text-gray-500">We Grow Sales System</p>
                                            <p className="text-xs text-gray-500 mt-1">លេខវិក្កយបត្រ: INV-{saleData.id}</p>
                                        </div>
                                    </div>
                                    <div className="text-sm text-right">
                                        <p><span className="font-semibold">កាលបរិច្ឆេទ:</span> {formatDisplayDate(saleData.date)}</p>
                                        <p><span className="font-semibold">ផុតកំណត់ប្រើ:</span> {formatDisplayDate(saleData.endDate)}</p>
                                        <p><span className="font-semibold">ផេក:</span> {saleData.pageName || '-'}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
                                    <div className="border rounded-xl p-4 bg-gray-50">
                                        <h4 className="font-bold text-gray-900 mb-2">ព័ត៌មានភ្ញៀវ</h4>

                                            <p><span className="font-semibold">អាសយដ្ឋាន:</span> {saleData.location || '-'}</p>

                                        <h4 className="font-bold text-gray-900 mb-2">ព័ត៌មានការលក់</h4>
                                        <div className="space-y-1 text-sm">
                                            <p><span className="font-semibold">អ្នកគ្រប់គ្រង:</span> {saleData.managerName || '-'}</p>
                                            <p><span className="font-semibold">អ្នកគ្រូប្រឹក្សា:</span> {saleData.consultantName || '-'}</p>
                                            <p><span className="font-semibold">ការទូទាត់:</span> {saleData.paymentMethod || '-'}</p>
                                            <p><span className="font-semibold">ដឹកតាម:</span> {saleData.delivery || '-'}</p>
                                            <p><span className="font-semibold">ជំងឺ/បញ្ហា:</span> {saleData.diseaseType || '-'}</p>

                                <div className="overflow-hidden rounded-xl border mb-5">
                                    <table className="w-full text-sm border-collapse">
                                        <thead>
                                            <tr className="bg-blue-800 text-white">
                                                <th className="text-left px-3 py-2">Product</th>

                                                <th className="text-right px-3 py-2">Price</th>

                                        <tbody>
                                            <tr className="border-t">
                                                <td className="px-3 py-3">{'ផលិតផលវីនារី'}</td>
                                                <td className="px-3 py-3 text-center">{saleData.quantity || 0}</td>
                                                <td className="px-3 py-3 text-right">{formatMoney(saleData.price)}</td>
                                                <td className="px-3 py-3 text-right">$0.00</td>
                                                <td className="px-3 py-3 text-right font-semibold">{formatMoney(saleData.price)}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                                    <div>
                                        <div className="text-sm text-gray-600 space-y-1">
                                            <p><span className="font-semibold">Source:</span> {saleData.source || '-'}</p>
                                            <p><span className="font-semibold">Duration:</span> {saleData.duration || 0} ថ្ងៃ</p>
                                        </div>
                                    </div>
                                    <div className="border rounded-xl p-4 bg-gray-50">
                                        <div className="flex justify-between text-sm py-1"><span>Total Quantity</span><span className="font-semibold">{saleData.quantity || 0}</span></div>
                                        <div className="flex justify-between text-sm py-1"><span>Subtotal</span><span className="font-semibold">{formatMoney(saleData.price)}</span></div>
                                        <div className="flex justify-between text-sm py-1"><span>Discount</span><span className="font-semibold">$0.00</span></div>
                                        <div className="flex justify-between text-lg py-2 mt-2 border-t font-bold text-blue-700"><span>Total</span><span>{formatMoney(saleData.price)}</span></div>
                                    </div>
                                </div>

                                <div className="mt-6 pt-4 border-t space-y-4 text-xs text-gray-500">
                                    <div className="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-[12px] leading-relaxed text-amber-900">
                                        <p className="font-semibold">ចំណាំ / Note</p>
                                        <p>រាល់ការបញ្ជាទិញដែលបានបញ្ជាក់រួច មិនអាចលុបចោលវិញបានទេ។</p>

                                        <div>
                                            <p>សូមអរគុណសម្រាប់ការគាំទ្រ</p>
                                            <p>Thank you for your support</p>
                                        </div>

                                            <p>Seller: __________________</p>

                        </div>

                        <div className="px-4 py-3 border-t bg-white flex flex-wrap justify-end gap-2">
                            <button onClick={handleCopyText} className="px-3 py-2 rounded-lg border text-sm hover:bg-gray-50 flex items-center gap-2"><Icons.Copy size={15} /> Copy Text</button>
                            <button onClick={handleCopyImage} className="px-3 py-2 rounded-lg border text-sm hover:bg-gray-50 flex items-center gap-2"><Icons.Image size={15} /> Copy Image</button>
                            <button onClick={handleDownloadImage} className="px-3 py-2 rounded-lg bg-green-600 text-white text-sm hover:bg-green-700 flex items-center gap-2"><Icons.Download size={15} /> Download PNG</button>
                            <button onClick={handlePrintInvoice} className="px-3 py-2 rounded-lg bg-blue-600 text-white text-sm hover:bg-blue-700 flex items-center gap-2"><Icons.Printer size={15} /> Print</button>
                        </div>
                    </div>

        };

        const SmartPasteModal = ({ onClose, onExtract, apiKey, onAlert, pageList }) => {
            const [text, setText] = useState('');
            const [loading, setLoading] = useState(false);
            const fileInputRef = useRef(null);

            const handleProcessAI = async () => {
                if (!text.trim()) return;
                if (!apiKey) { onAlert("សូមដាក់ API Key ក្នុង Settings ជាមុនសិន ដើម្បីប្រើ AI។"); return; }
                setLoading(true);
                try {
                    const prompt = `Extract entities from this Khmer sales text into JSON: "date" (YYYY-MM-DD), "customerName", "phone", "province", "district", "commune", "village", "quantity" (number), "price" (number), "diseaseType", "consultantName", "managerName", "pageName". Available pages: ${JSON.stringify(pageList)}. If page is mentioned, map to closest match. Return ONLY the JSON.\n\nSales text:\n${text}`;
                    const resultText = await callGemini(apiKey, prompt);
                    const jsonStr = resultText.replace(/```json|```/g, '').trim();
                    const data = JSON.parse(jsonStr);
                    onExtract(data);
                } catch (error) { onAlert("AI Error: " + error.message); } finally { setLoading(false); }
            };

            const handleProcessTelegram = () => {
                if (!text.trim()) return;
                try {
                    const data = {};
                    const lines = text.split('\n');

                    // 1. Date
                    let dateMatch = text.match(/(?:Date|កាលបរិច្ឆេទ)\s*[៖:：]?\s*(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})/i);
                    if (!dateMatch) dateMatch = text.match(/(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})/);
                    if (dateMatch) data.date = `${dateMatch[3]}-${dateMatch[2].padStart(2, '0')}-${dateMatch[1].padStart(2, '0')}`;

                    // 2. Price
                    const priceMatch = text.match(/តម្លៃ\s*[៖:]\s*(\d+(\.\d+)?)/);
                    if (priceMatch) data.price = parseFloat(priceMatch[1]);

                    // 3. Quantity
                    const qtyLine = text.match(/=\s*([0-9\+]+)\s*ប្រអប់/);
                    if (qtyLine) {
                        const qtyPart = qtyLine[1];
                        if (qtyPart.includes('+')) {
                            const parts = qtyPart.split('+').map(num => parseInt(num.trim()));
                            data.quantity = parts.reduce((a, b) => a + b, 0);
                        } else {
                            data.quantity = parseInt(qtyPart);
                        }
                    }

                    // 4. Phone (Receiver)
                    const phoneMatch = text.match(/(?:លេខអ្នកទទួល|Tel|Phone)\s*[:៖]?\s*([0-9 ]{8,})/i);
                    if (phoneMatch) {
                        let rawPhone = phoneMatch[1].replace(/\s/g, '');
                        // REMOVED: if (rawPhone.startsWith('0')) rawPhone = rawPhone.substring(1);
                        data.phone = rawPhone;
                    }

                    // 5. Customer Name - IMPROVED
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (line.includes("អ្នកគ្រូ") || line.includes("Manager") || line.includes("Admin")) continue;
                        const nameMatch = line.match(/(?:[\*•-]\s*)?(?:ឈ្មោះ|ឈ្មេាះ|Customer).*?[:៖]?\s*(.*)/i);
                        if (nameMatch) {
                            const extractedName = nameMatch[1].trim();
                            if (extractedName && extractedName.length > 1) {
                                data.customerName = extractedName;
                                break;
                            }
                        }
                    }

                    // 6. Disease
                    const diseaseMatch = text.match(/(?:[\*•-]\s*)?(?:បញ្ហា|បព្ហា|Problem|Disease).*?[:៖]?\s*(.*)/i);
                    if (diseaseMatch) data.diseaseType = diseaseMatch[1].trim();

                    // 7. Customer Type
                    for (const line of lines) {
                        if (line.includes("ភ្ញៀវ") || line.includes("Customer")) {
                            if (line.includes("ថ្មី") || line.includes("New")) {
                                data.customerType = "ថ្មី";
                                break;
                            } else if (line.includes("ចាស់") || line.includes("Old")) {
                                data.customerType = "ចាស់";
                                break;
                            }
                        }
                    }
                    if (!data.customerType) {
                        if (text.includes("ភ្ញៀវថ្មី")) data.customerType = "ថ្មី";
                        else if (text.includes("ភ្ញៀវចាស់")) data.customerType = "ចាស់";
                    }

                    // 8. Delivery
                    if (text.toLowerCase().includes("vet")) data.delivery = "VET";
                    else if (text.toLowerCase().includes("j&t")) data.delivery = "J&T";
                    else if (text.toLowerCase().includes("capitol")) data.delivery = "Capitol";
                    else if (text.toLowerCase().includes("motor") || text.includes("ម៉ូតូ")) data.delivery = "Motor";

                    // 9. Location
                    const locMatch = text.match(/ទីតាំង\s*[៖:]\s*(.*)/);
                    if (locMatch) {
                        const fullLoc = locMatch[1].trim();
                        let foundProvince = "";
                        for (const p of CAMBODIA_PROVINCES) {
                            if (fullLoc.includes(p)) {
                                foundProvince = p;
                                break;
                            }
                        }
                        if (!foundProvince && (fullLoc.includes("កំពង់សោម") || fullLoc.includes("ក្រុងព្រះសីហនុ"))) {
                            foundProvince = "ព្រះសីហនុ";
                        }
                        if (foundProvince) {
                            data.province = foundProvince;
                            data.district = fullLoc;
                        } else {
                            data.district = fullLoc;
                        }
                    }

                    // 10. Consultant Name
                    for (let i = lines.length - 1; i >= 0; i--) {
                        const line = lines[i];
                        if (line.includes("ឈ្មោះ") && (line.includes("👉") || line.includes("អ្នកគ្រូ") || i > lines.length - 5)) {
                            const parts = line.split(/[៖:]/);
                            if (parts.length > 1) {
                                data.consultantName = parts[1].trim();
                                break;
                            }
                        }
                    }

                    if (Object.keys(data).length === 0) {
                        onAlert("មិនអាចចាប់ទិន្នន័យបានទេ។ សូមពិនិត្យទម្រង់សារឡើងវិញ។");
                    } else {
                        onExtract(data);
                    }
                } catch (error) {
                    onAlert("មានបញ្ហា: " + error.message);
                }
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!apiKey) { onAlert("សូមដាក់ API Key ដើម្បីប្រើមុខងារស្កេនរូបភាព (Image Scan)។"); return; }
                setLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64Image = reader.result;
                    try {
                        const prompt = `Analyze this image of a sales order. Extract entities into JSON: "date" (YYYY-MM-DD), "customerName", "phone", "province", "district", "commune", "village", "quantity" (number), "price" (number), "diseaseType", "consultantName", "managerName", "pageName". Available pages: ${JSON.stringify(pageList)}. Return ONLY the JSON.`;
                        const resultText = await callGemini(apiKey, prompt, base64Image);
                        const jsonStr = resultText.replace(/```json|```/g, '').trim();
                        const data = JSON.parse(jsonStr);
                        onExtract(data);
                    } catch (error) { onAlert("មានបញ្ហាក្នុងការស្កេនរូបភាព: " + error.message); } finally { setLoading(false); }
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white p-6 rounded-lg shadow-xl w-[600px]">
                        <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-blue-700"><Icons.Sparkles size={20} /> បញ្ចូលទិន្នន័យរហ័ស (Smart Import)</h3>
                        <div className="mb-4 space-y-4">
                            <div className="border-2 border-dashed border-purple-300 rounded-lg p-4 text-center hover:bg-purple-50 transition cursor-pointer" onClick={() => fileInputRef.current.click()}><Icons.Camera size={24} className="mx-auto text-purple-500 mb-2" /><span className="text-sm text-purple-700 font-medium">ចុចទីនេះដើម្បីស្កេនរូបភាពកុម្ម៉ង់ (Scan Image)</span><input type="file" ref={fileInputRef} accept="image/*" className="hidden" onChange={handleImageUpload} /></div>
                            <div className="text-center text-xs text-gray-400">- ឬ -</div>
                            <textarea rows="8" placeholder="Paste សារ Telegram នៅទីនេះ..." value={text} onChange={(e) => setText(e.target.value)} className="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm bg-gray-50"></textarea>
                        </div>
                        <div className="flex justify-end gap-2 items-center pt-2 border-t">
                            {loading && <div className="loader mr-2"></div>}
                            <button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded text-sm">បិទ</button>
                            <button onClick={handleProcessTelegram} disabled={loading || !text.trim()} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-2 disabled:opacity-50 text-sm font-bold shadow-sm"><Icons.List size={16} /> ស្រង់ទិន្នន័យ Telegram</button>
                            <button onClick={handleProcessAI} disabled={loading || !text.trim()} className="px-4 py-2 bg-purple-100 text-purple-700 border border-purple-200 rounded hover:bg-purple-200 flex items-center gap-2 disabled:opacity-50 text-sm"><Icons.Sparkles size={16} /> ប្រើ AI (ប្លែកៗ)</button>
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ totalRevenue, totalBoxes, totalCustomers, sales }) => {
            const newCustomers = sales.filter(s => s.customerType === 'ថ្មី').length;
            const oldCustomers = sales.filter(s => s.customerType === 'ចាស់').length;

            const manager1Sales = sales.filter(s => normalizeManagerName(s.managerName) === MANAGERS[0]);
            const manager2Sales = sales.filter(s => normalizeManagerName(s.managerName) === MANAGERS[1]);

            const m1Revenue = manager1Sales.reduce((acc, curr) => acc + (Number(curr.price) || 0), 0);
            const m2Revenue = manager2Sales.reduce((acc, curr) => acc + (Number(curr.price) || 0), 0);

            return (
                <div className="no-print w-full px-4">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div className="bg-blue-600 text-white p-4 rounded-lg shadow-lg"><h3 className="text-base font-semibold opacity-90">ចំណូលសរុប (Revenue)</h3><p className="text-2xl font-bold mt-1">${totalRevenue.toFixed(2)}</p></div>
                        <div className="bg-green-600 text-white p-4 rounded-lg shadow-lg"><h3 className="text-base font-semibold opacity-90">ចំនួនលក់សរុប (Units)</h3><p className="text-2xl font-bold mt-1">{totalBoxes} ប្រអប់</p></div>
                        <div className="bg-purple-600 text-white p-4 rounded-lg shadow-lg"><h3 className="text-base font-semibold opacity-90">ចំនួនអតិថិជនសរុប(TNC)</h3><p className="text-2xl font-bold mt-1">{totalCustomers} នាក់</p></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div className="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500"><h3 className="text-sm font-bold text-gray-500 uppercase">សុីវ សីលា (Team A)</h3><div className="flex justify-between items-end mt-2"><div className="text-2xl font-bold text-blue-700">${m1Revenue.toFixed(2)}</div><div className="text-sm text-gray-500">{manager1Sales.length} វិក្កយបត្រ</div></div></div>
                        <div className="bg-white p-4 rounded-lg shadow border-l-4 border-pink-500"><h3 className="text-sm font-bold text-gray-500 uppercase">ស៊ុន រដ្ធា (Team B)</h3><div className="flex justify-between items-end mt-2"><div className="text-2xl font-bold text-pink-700">${m2Revenue.toFixed(2)}</div><div className="text-sm text-gray-500">{manager2Sales.length} វិក្កយបត្រ</div></div></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div className="bg-teal-600 text-white p-4 rounded-lg shadow-lg"><h3 className="text-base font-semibold opacity-90">អតិថិជនថ្មី (New Customers)</h3><p className="text-2xl font-bold mt-1">{newCustomers} នាក់</p></div>
                        <div className="bg-orange-600 text-white p-4 rounded-lg shadow-lg"><h3 className="text-base font-semibold opacity-90">អតិថិជនចាស់ (Old Customers)</h3><p className="text-2xl font-bold mt-1">{oldCustomers} នាក់</p></div>
                    </div>
                </div>
            );
        };

        const InputFormView = ({ formData, handleInputChange, handleSubmit, isEditing, cancelEdit, onSmartPaste, onClearForm, pageList }) => (
            <div className="bg-white p-4 rounded-lg shadow-md border border-gray-200 no-print w-full mx-auto">
                <div className="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 className={`text-lg font-bold flex items-center gap-2 ${isEditing ? 'text-amber-600' : 'text-gray-800'}`}>{isEditing ? <Icons.Edit2 size={18} /> : <Icons.PlusCircle size={18} className="text-blue-600" />}{isEditing ? 'កែប្រែទិន្នន័យ (Update)' : 'បញ្ចូលទិន្នន័យថ្មី (New Entry)'}</h2>
                    <div className="flex gap-2">
                        {!isEditing && <button onClick={onSmartPaste} className="text-purple-600 hover:bg-purple-50 border border-purple-200 px-3 py-1 rounded text-xs font-medium flex items-center gap-1 transition"><Icons.Sparkles size={12} /> AI Paste</button>}
                        {isEditing && <button onClick={cancelEdit} className="text-gray-500 hover:text-red-500 flex items-center gap-1 text-xs bg-gray-100 px-2 py-1 rounded"><Icons.XCircle size={12} /> បោះបង់</button>}
                        <button onClick={onClearForm} className="text-gray-500 hover:text-gray-700 border border-gray-300 px-3 py-1 rounded text-xs font-medium flex items-center gap-1 transition bg-gray-50"><Icons.RotateCcw size={12} /> សម្អាត</button>
                    </div>
                </div>
                <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                    <div><label className="block text-[11px] font-bold text-gray-600 mb-1">ថ្ងៃខែ (Date)</label><input type="date" name="date" required value={formData.date} onChange={handleInputChange} className="w-full p-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none" /></div>
                    <div className="bg-yellow-50 p-1 rounded border border-yellow-200"><label className="block text-[11px] font-bold text-gray-600 mb-1 flex items-center gap-1"><Icons.Users size={12} /> ឈ្មោះមេគ្រប់គ្រង (Manager)</label><select name="managerName" value={formData.managerName} onChange={handleInputChange} className="w-full p-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none font-bold text-blue-800">{MANAGERS.map(m => <option key={m} value={m}>{m}</option>)}</select></div>

                    {/* Page Name Selector - NEW */}
                    <div className="bg-blue-50 p-1 rounded border border-blue-200"><label className="block text-[11px] font-bold text-gray-600 mb-1 flex items-center gap-1"><Icons.Facebook size={12} /> ឈ្មោះផេក (Page Name)</label><select name="pageName" value={formData.pageName} onChange={handleInputChange} className="w-full p-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 outline-none font-bold text-blue-800">{pageList.map(p => <option key={p} value={p}>{p}</option>)}</select></div>

                            <thead><tr><th>ថ្ងៃខែ</th><th>ឈ្មោះផេក</th><th>មេគ្រប់គ្រង</th><th>អ្នកប្រឹក្សា</th><th>ឈ្មោះអតិថិជន</th><th>ទីតាំង</th><th>លេខទូរស័ព្ទ</th><th>ជំងឺ</th><th>តម្លៃ</th><th>ប្រអប់</th><th>ទូទាត់</th><th>ផុតកំណត់</th><th>ភ្ញៀវ</th><th>ប្រភព</th><th>ដឹកតាម</th><th className="no-print text-center">សកម្មភាព</th></tr></thead>

                                                <button onClick={() => handleEdit(sale)} className="text-amber-500 hover:text-amber-700 p-1 hover:bg-amber-50 rounded" title="កែប្រែ"><Icons.Edit2 size={14} /></button>

        const FollowUpView = ({ sales, followUpDate, setFollowUpDate, followRange, setFollowRange, followSearchTerm, setFollowSearchTerm, onCopyPhone, onCopyReminder, onPrint, onExportCSV, onCopyImage, followUpTickets, onToggleTicket, logo, followUpPrintConfig, setFollowUpPrintConfig }) => {
            const [statusFilter, setStatusFilter] = useState('all');
            const rangeStart = normalizeDateISO(followRange?.start);
            const rangeEnd = normalizeDateISO(followRange?.end);
            const today = getTodayLocal();
            const tomorrow = addDaysToLocalDate(today, 1);
            const sevenDayEnd = addDaysToLocalDate(today, 6);

            const getFollowStatusMeta = (activeFollowDate, isCalled) => {
                if (isCalled) {
                    return {
                        key: 'called',
                        label: 'បានខលរួច',
                        className: 'bg-emerald-100 text-emerald-800 border border-emerald-300',
                        priority: 5
                    };
                }
                if (activeFollowDate && activeFollowDate < today) {
                    return {
                        key: 'overdue',
                        label: 'ហួសថ្ងៃខល',
                        className: 'bg-red-100 text-red-700 border border-red-300',
                        priority: 1
                    };
                }
                if (activeFollowDate === today) {
                    return {
                        key: 'today',
                        label: 'ត្រូវខលថ្ងៃនេះ',
                        className: 'bg-yellow-100 text-yellow-800 border border-yellow-300',
                        priority: 2
                    };
                }
                if (activeFollowDate === tomorrow) {
                    return {
                        key: 'tomorrow',
                        label: 'ត្រូវខលស្អែក',
                        className: 'bg-sky-100 text-sky-700 border border-sky-300',
                        priority: 3
                    };
                }
                return {
                    key: 'upcoming',
                    label: 'ខាងមុខ',
                    className: 'bg-blue-100 text-blue-700 border border-blue-300',
                    priority: 4
                };
            };

            const matchStatusFilter = (item) => {
                if (statusFilter === 'all') return true;
                if (statusFilter === 'called') return item.isCalled;
                if (statusFilter === 'pending') return !item.isCalled;
                return item.statusMeta.key === statusFilter;
            };

            const allInRangeSales = sales
                .map(sale => {
                    const followInfo = getSaleFollowUpInfo(sale, followUpDate);
                    const followUpDatesInRange = followInfo.followUpDates.filter(date => isDateWithinInclusive(date, rangeStart, rangeEnd));
                    const activeFollowDate = followUpDatesInRange[0] || '';
                    const ticketKey = activeFollowDate ? createFollowUpTicketKey(sale.id, activeFollowDate) : '';
                    const isCalled = ticketKey ? !!followUpTickets[ticketKey] : false;
                    const statusMeta = getFollowStatusMeta(activeFollowDate, isCalled);
                    return { sale, followInfo, followUpDatesInRange, activeFollowDate, ticketKey, isCalled, statusMeta };
                })
                .filter(item => item.followUpDatesInRange.length > 0);

            const enrichedSales = allInRangeSales
                .filter((item) => {
                    const searchLower = followSearchTerm.toLowerCase().trim();
                    const matchesSearch = !searchLower || [item.sale.customerName, item.sale.phone, item.sale.location, item.sale.diseaseType, item.sale.consultantName, item.sale.province]
                        .filter(Boolean)
                        .some(value => String(value).toLowerCase().includes(searchLower));
                    return matchesSearch && matchStatusFilter(item);
                })
                .sort((a, b) => {
                    if (a.statusMeta.priority !== b.statusMeta.priority) return a.statusMeta.priority - b.statusMeta.priority;
                    const aFirst = a.activeFollowDate || '9999-99-99';
                    const bFirst = b.activeFollowDate || '9999-99-99';
                    if (aFirst !== bFirst) return aFirst.localeCompare(bFirst);
                    return String(a.sale.date || '').localeCompare(String(b.sale.date || ''));
                });

            const totalInRange = allInRangeSales.length;
            const dueTodayCount = allInRangeSales.filter(item => item.statusMeta.key === 'today').length;
            const overdueCount = allInRangeSales.filter(item => item.statusMeta.key === 'overdue').length;
            const pendingCount = allInRangeSales.filter(item => !item.isCalled).length;
            const calledCount = allInRangeSales.filter(item => item.isCalled).length;
            const weeklyPreview = rangeStart && rangeEnd ? `${formatDateDisplay(rangeStart)} ដល់ ${formatDateDisplay(rangeEnd)}` : '-';

            const applyQuickRange = (startDate, endDate = startDate) => {
                setFollowUpDate(startDate);
                setFollowRange({ start: startDate, end: endDate });
            };

            return (
                <div className="space-y-4">

                        </div>
                        <div className="bg-red-50 border border-red-200 rounded-xl p-4">
                            <div className="text-xs text-red-700 font-bold uppercase">ហួសថ្ងៃខល</div>
                            <div className="text-3xl font-bold text-red-800 mt-1">{overdueCount}</div>
                            <div className="text-xs text-red-700 mt-1">គួរទាក់ទងមុនគេ</div>
                        </div>
                        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
                            <div className="text-xs text-yellow-700 font-bold uppercase">ត្រូវខលថ្ងៃនេះ</div>
                            <div className="text-3xl font-bold text-yellow-800 mt-1">{dueTodayCount}</div>
                            <div className="text-xs text-yellow-700 mt-1">ការងារបន្ទាន់សម្រាប់ថ្ងៃនេះ</div>
                        </div>
                        <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                            <div className="text-xs text-blue-700 font-bold uppercase">មិនទាន់បានខល</div>
                            <div className="text-3xl font-bold text-blue-800 mt-1">{pendingCount}</div>
                            <div className="text-xs text-blue-700 mt-1">រង់ចាំ follow up</div>
                        </div>
                        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4">

                                                                aria-label={isCalled ? 'បានខលរួច' : 'មិនទាន់បានខល'}
                                                            >

        };

        const AuthPage = ({ onLogin }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [accountName, setAccountName] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [error, setError] = useState('');
            const [logo, setLogo] = useState(localStorage.getItem(STORAGE_KEYS.LOGO) || '');

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 1024 * 1024) {
                    setError('Logo ធំពេក។ សូមប្រើ file តូចជាង 1MB។');
                    e.target.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result;
                    setLogo(base64);
                    localStorage.setItem(STORAGE_KEYS.LOGO, base64);
                };
                reader.readAsDataURL(file);
            };

            const resetAuthForm = (nextIsLogin) => {
                setIsLogin(nextIsLogin);
                setAccountName('');
                setPassword('');
                setConfirmPassword('');
                setError('');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                const normalizedName = normalizeAuthName(accountName);

                try {
                    const users = await migrateLegacyUsers();

                    if (isLogin) {
                        if (users.length === 0) {
                            setError('មិនទាន់មានគណនីទេ! សូមចុះឈ្មោះ (Signup) ជាមុនសិន។');
                            return;
                        }
                        if (!password.trim()) {
                            setError('សូមបញ្ចូល password។');
                            return;
                        }

                        const matchedUsers = await findUsersByPassword(password, users);
                        if (matchedUsers.length === 0) {
                            setError('Password មិនត្រឹមត្រូវ!');
                            return;
                        }
                        if (matchedUsers.length > 1) {
                            setError('មានគណនីច្រើនប្រើ password ដូចគ្នា។ សូមប្ដូរ password ឲ្យខុសគ្នាសិន។');
                            return;
                        }

                        const user = matchedUsers[0];
                        onLogin({ userId: user.userId, name: getUserDisplayName(user) });
                        return;
                    }

                    if (!normalizedName) {
                        setError('សូមបញ្ចូលឈ្មោះគណនី។');
                        return;
                    }
                    if (normalizedName.length < 2) {
                        setError('ឈ្មោះគណនីត្រូវមានយ៉ាងហោចណាស់ 2 តួអក្សរ។');
                        return;
                    }
                    if (password.length < 8) {
                        setError('Password ត្រូវមានយ៉ាងហោចណាស់ 8 តួអក្សរ។');
                        return;
                    }
                    if (password !== confirmPassword) {
                        setError('លេខសម្ងាត់ទាំងពីរមិនដូចគ្នាទេ!');
                        return;
                    }

                    const duplicateName = users.find(u => normalizeAuthName(getUserDisplayName(u)).toLowerCase() === normalizedName.toLowerCase());
                    if (duplicateName) {
                        setError('ឈ្មោះគណនីនេះមានរួចហើយ!');
                        return;
                    }

                    const duplicatePasswordUsers = await findUsersByPassword(password, users);
                    if (duplicatePasswordUsers.length > 0) {
                        setError('Password នេះត្រូវបានប្រើរួចហើយ។ ព្រោះ login ប្រើតែ password សូមកំណត់ password ថ្មីដែលខុសពីគេ។');
                        return;
                    }

                    const hashed = await hashPassword(password);
                    const newUser = {
                        userId: createUserId(),
                        name: normalizedName,
                        passwordHash: hashed.passwordHash,
                        passwordSalt: hashed.passwordSalt,
                        createdAt: Date.now()
                    };
                    localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify([...users, newUser]));
                    onLogin({ userId: newUser.userId, name: newUser.name });
                } catch (error) {
                    console.error(error);
                    setError(error.message || 'មានបញ្ហាក្នុងការចូលប្រើប្រព័ន្ធ');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 font-sans" style={{ fontFamily: "'Battambang', 'Siemreap', sans-serif" }}>
                    <div className="bg-white p-8 rounded-lg shadow-xl w-[400px] border border-gray-200 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-blue-900"></div>
                        <div className="text-center mb-8 relative group">
                            <input type="file" id="login-logo-upload" className="hidden" accept="image/*" onChange={handleLogoUpload} />
                            <label htmlFor="login-logo-upload" className="cursor-pointer relative inline-block">
                                {logo ? <img src={logo} alt="Logo" className="h-24 w-24 mx-auto mb-2 object-contain rounded-full border border-gray-100 shadow-sm" /> : <div className="h-20 w-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-2 border border-blue-100 text-blue-900 group-hover:bg-blue-100 transition"><Icons.Users size={40} /></div>}
                                <div className="absolute bottom-0 right-0 bg-white rounded-full p-1.5 shadow-md border border-gray-200 text-gray-500 hover:text-blue-600 hover:bg-gray-50 transition-colors"><Icons.Camera size={16} /></div>
                            </label>
                            <h1 className="text-2xl font-bold text-blue-900 uppercase tracking-wider mt-2">We Grow Team</h1>
                            <p className="text-xs text-gray-500 mt-1">ប្រព័ន្ធគ្រប់គ្រងការលក់ (Sales System)</p>
                        </div>
                        <h2 className="text-lg font-bold text-center mb-6 text-gray-700 border-b pb-3">{isLogin ? 'ចូលប្រើប្រាស់ (Login)' : 'ចុះឈ្មោះ (Signup)'}</h2>
                        {error && <div className="bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded mb-4 text-sm text-center flex items-center justify-center gap-2"><Icons.AlertTriangle size={16} /> {error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && <div><label className="block text-xs font-bold text-gray-600 mb-1">ឈ្មោះគណនី (Account Name)</label><input type="text" placeholder="ឧ. Admin ឬ Sreynich" required className="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm" value={accountName} onChange={(e) => setAccountName(e.target.value)} /></div>}
                            <div className="relative">
                                <label className="block text-xs font-bold text-gray-600 mb-1">{isLogin ? 'ពាក្យសម្ងាត់ (Password)' : 'បង្កើតពាក្យសម្ងាត់ (Create Password)'}</label>
                                <input type={showPassword ? 'text' : 'password'} placeholder="********" required className="w-full px-3 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm" value={password} onChange={(e) => setPassword(e.target.value)} />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-8 text-gray-400 hover:text-gray-600">{showPassword ? <Icons.EyeOff size={18} /> : <Icons.Eye size={18} />}</button>
