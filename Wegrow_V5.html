                    .filter(({ sale, followUpDatesInRange }) => {
                        const searchLower = followSearchTerm.toLowerCase().trim();
                        const matchesSearch = !searchLower || [sale.customerName, sale.phone, sale.location, sale.diseaseType, sale.consultantName]
                            .filter(Boolean)
                            .some(value => String(value).toLowerCase().includes(searchLower));
                        return followUpDatesInRange.length > 0 && matchesSearch;
                    });

                let csvContent = "\uFEFF";
                csvContent += "ថ្ងៃលក់,ឈ្មោះភ្ញៀវ,លេខទូរស័ព្ទ,ទីតាំង,បញ្ហា,ចំនួន,ថ្ងៃត្រូវខលក្នុងចន្លោះនេះ,ថ្ងៃអស់ថ្នាំ\n";
                rows.forEach(({ sale, followInfo, followUpDatesInRange }) => {
                    csvContent += [
                        sanitizeCsvCell(formatDateDisplay(sale.date)),
                        sanitizeCsvCell(sale.customerName || ''),
                        sanitizeCsvCell(sale.phone || ''),
                        sanitizeCsvCell(sale.province || sale.location || ''),
                        sanitizeCsvCell(sale.diseaseType || ''),
                        sanitizeCsvCell(sale.quantity || ''),
                        sanitizeCsvCell(followUpDatesInRange.map(formatDateDisplay).join(' | ')),
                        sanitizeCsvCell(formatDateDisplay(followInfo.endDate))
                    ].join(',') + '\n';
                });
                downloadTextFile(`we_grow_follow_up_${getTodayLocal()}.csv`, csvContent, 'text/csv;charset=utf-8;');
            };

            const handleFollowUpPrint = () => {
                window.print();
            };

            const handleFollowUpCopyImage = async () => {
                if (typeof html2canvas === 'undefined') { showAlert('កំពុងដំណើរការ... សូមរង់ចាំបន្តិច។'); return; }
                if (!window.ClipboardItem) { showAlert('Browser នេះមិនគាំទ្រ Copy Image ទេ។'); return; }
                const element = document.querySelector('.followup-print-container');
                if (!element) return;
                const clone = element.cloneNode(true);
                clone.classList.add('capture-mode');
                const toolbar = clone.querySelectorAll('.no-print');
                toolbar.forEach(el => el.remove());

                const ticketIcons = clone.querySelectorAll('.print-inline-status');
                ticketIcons.forEach(el => {
                    el.style.display = 'inline-flex';
                    el.style.alignItems = 'center';
                    el.style.justifyContent = 'center';
                    el.style.fontSize = '18px';
                    el.style.lineHeight = '1';
                    el.style.background = 'transparent';
                    el.style.border = 'none';
                    el.style.padding = '0';
                    el.style.margin = '0';
                });

                const container = document.createElement('div');
                container.style.position = 'absolute';
                container.style.left = '-9999px';
                container.style.top = '0';
                container.appendChild(clone);
                document.body.appendChild(container);
                try {
                    const canvas = await html2canvas(clone, { scale: 3, backgroundColor: '#ffffff', logging: false, useCORS: true });
                    canvas.toBlob(async (blob) => {
                        try {
                            if (!blob) throw new Error('No blob');
                            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                            showToast('បានចម្លងរូបភាព Follow Up រួចរាល់!');
                        } catch (err) {
                            showAlert('មិនអាចចម្លងរូបភាពបានទេ។');
                        }
                    }, 'image/png');
                } catch (err) {
                    showAlert('មានបញ្ហាក្នុងការបង្កើតរូបភាព។');
                } finally {
                    document.body.removeChild(container);
                }
            };

            const openSmartPaste = () => { setShowSmartPaste(true); };

            return (
                <div className="min-h-screen bg-gray-100 font-sans">
                    <style>{`@media print { @page { size: A4 ${activeTab === 'followup' ? followUpPrintConfig.orientation : printConfig.orientation}; margin: 10mm; } table { font-size: ${activeTab === 'followup' ? followUpPrintConfig.fontSize : printConfig.fontSize} !important; font-family: '${activeTab === 'followup' ? followUpPrintConfig.font : printConfig.font}', sans-serif !important; } .custom-table th, .custom-table td { font-size: ${activeTab === 'followup' ? followUpPrintConfig.fontSize : printConfig.fontSize} !important; font-family: '${activeTab === 'followup' ? followUpPrintConfig.font : printConfig.font}', sans-serif !important; padding: 4px 2px !important; } }`}</style>
                    {toast && <NotificationToast message={toast} />}
                    <AlertModal isOpen={alertModal.isOpen} message={alertModal.message} type={alertModal.type} onClose={() => setAlertModal({ ...alertModal, isOpen: false })} />
                    <ConfirmModal isOpen={confirmModal.isOpen} message={confirmModal.message} onConfirm={confirmModal.onConfirm} onCancel={() => setConfirmModal({ ...confirmModal, isOpen: false })} />
                    <header className="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-10 no-print">
                        <div className="container mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">{logo && <img src={logo} alt="Logo" className="h-12 w-12 object-contain bg-white rounded-full p-1" />}<div><h1 className="text-2xl font-bold uppercase tracking-wider flex items-center gap-2">We Grow Team <span className="bg-purple-600 text-xs px-2 py-0.5 rounded-full flex items-center gap-1"><Icons.Sparkles size={10} /></span></h1><p className="text-xs text-blue-200">Admin: <span className="text-yellow-300 font-bold">{currentUser?.name}</span> | Sales Management System</p></div></div>
                            <div className="hidden md:flex items-center gap-4"><p className="text-sm font-semibold">{getTodayLocal()}</p><button onClick={() => setShowSettingsModal(true)} className="p-2 hover:bg-blue-800 rounded-full transition" title="Settings & Logo"><Icons.Settings size={20} /></button></div>
                        </div>
                    </header>
                    <div className="bg-white border-b shadow-sm no-print">
                        <div className="container mx-auto flex">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-2 px-6 py-4 font-medium transition ${activeTab === 'dashboard' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-600 hover:bg-gray-50'}`}><Icons.LayoutDashboard size={20} /> ទិន្នន័យរួម</button>
                            <button onClick={() => setActiveTab('input')} className={`flex items-center gap-2 px-6 py-4 font-medium transition ${activeTab === 'input' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-600 hover:bg-gray-50'}`}><Icons.PlusCircle size={20} /> បញ្ចូលទិន្នន័យ</button>
                            <button onClick={() => setActiveTab('list')} className={`flex items-center gap-2 px-6 py-4 font-medium transition ${activeTab === 'list' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-600 hover:bg-gray-50'}`}><Icons.FileText size={20} /> របាយការណ៍</button>
                            <button onClick={() => setActiveTab('followup')} className={`flex items-center gap-2 px-6 py-4 font-medium transition ${activeTab === 'followup' ? 'text-amber-600 border-b-2 border-amber-500 bg-amber-50' : 'text-gray-600 hover:bg-gray-50'}`}><Icons.Calendar size={20} /> Follow Up <span className="ml-1 bg-yellow-100 text-yellow-800 border border-yellow-300 text-xs px-2 py-0.5 rounded-full">{todayFollowUpCount}</span></button>
                        </div>
                    </div>

                    {/* Page Filter Bar - New Feature */}
                    <div className="bg-gray-50 border-b page-filters no-print overflow-x-auto">
                        <div className="container mx-auto px-4 py-2 flex flex-wrap gap-2 items-center">
                            <button
                                onClick={() => setActivePageFilter('All')}
                                className={`px-4 py-1.5 rounded-full text-sm font-medium border page-tab ${activePageFilter === 'All' ? 'active' : 'bg-white text-gray-600 border-gray-200'}`}
                            >
                                ទាំងអស់ (All)
                            </button>
                            {pageList.map(page => (
                                <button
                                    key={page}
                                    onClick={() => setActivePageFilter(page)}
                                    className={`px-4 py-1.5 rounded-full text-sm font-medium border page-tab ${activePageFilter === page ? 'active' : 'bg-white text-gray-600 border-gray-200'}`}
                                >
                                    <span className="flex items-center gap-1"><Icons.Facebook size={12} /> {page}</span>
                                </button>
                            ))}
                            {activePageFilter !== 'All' && (
                                <button
                                    onClick={() => handleClearPageData(activePageFilter)}
                                    className="px-4 py-1.5 rounded-full text-sm font-medium border border-red-200 bg-red-50 text-red-600 hover:bg-red-100 flex items-center gap-1 transition"
                                    title="លុបទិន្នន័យទាំងអស់របស់ផេកនេះ"
                                >
                                    <Icons.Trash2 size={12} /> Clear All ({sales.filter(sale => sale.pageName === activePageFilter).length})
                                </button>
                            )}
                        </div>
                    </div>

                    <main className="container mx-auto p-4 md:p-6">
                        {activeTab === 'dashboard' && (<><div className="no-print max-w-5xl mx-auto mb-8"><DashboardView totalRevenue={totalRevenue} totalBoxes={totalBoxes} totalCustomers={totalCustomers} sales={filteredSales} /></div><TableView filteredSales={filteredSales} searchTerm={searchTerm} setSearchTerm={setSearchTerm} handlePrint={handlePrint} exportToCSV={exportToCSV} handleEdit={handleEdit} handleDelete={handleDelete} onGenerateMessage={handleOpenMessageModal} onViewInvoice={handleOpenInvoiceModal} logo={logo} printConfig={printConfig} setPrintConfig={setPrintConfig} filterDate={filterDate} setFilterDate={setFilterDate} setMonthFilter={setMonthFilter} handleCopyImage={handleCopyImage} isDashboard={true} /></>)}
                        {activeTab === 'input' && <InputFormView formData={formData} handleInputChange={handleInputChange} handleSubmit={handleSubmit} isEditing={isEditing} cancelEdit={cancelEdit} onSmartPaste={openSmartPaste} onClearForm={handleClearForm} pageList={pageList} />}
                        {activeTab === 'list' && <TableView filteredSales={filteredSales} searchTerm={searchTerm} setSearchTerm={setSearchTerm} handlePrint={handlePrint} exportToCSV={exportToCSV} handleEdit={handleEdit} handleDelete={handleDelete} onGenerateMessage={handleOpenMessageModal} onViewInvoice={handleOpenInvoiceModal} logo={logo} printConfig={printConfig} setPrintConfig={setPrintConfig} filterDate={filterDate} setFilterDate={setFilterDate} setMonthFilter={setMonthFilter} handleCopyImage={handleCopyImage} />}
                        {activeTab === 'followup' && <FollowUpView sales={pageScopedSales} followUpDate={followUpDate} setFollowUpDate={setFollowUpDate} followRange={followRange} setFollowRange={setFollowRange} followSearchTerm={followSearchTerm} setFollowSearchTerm={setFollowSearchTerm} onCopyPhone={handleCopyPhone} onCopyReminder={handleCopyFollowUpMessage} onPrint={handleFollowUpPrint} onExportCSV={exportFollowUpToCSV} onCopyImage={handleFollowUpCopyImage} followUpTickets={followUpTickets} onToggleTicket={toggleFollowUpTicket} logo={logo} followUpPrintConfig={followUpPrintConfig} setFollowUpPrintConfig={setFollowUpPrintConfig} />}
                    </main>
                    {showSettingsModal && <SettingsModal apiKey={apiKey} setApiKey={setApiKey} logo={logo} setLogo={setLogo} pageList={pageList} setPageList={setPageList} sales={sales} setSales={setSales} onClose={() => setShowSettingsModal(false)} onAlert={showAlert} onToast={showToast} />}
                    {showSmartPaste && <SmartPasteModal apiKey={apiKey} onClose={() => setShowSmartPaste(false)} onExtract={handleExtractData} onAlert={showAlert} pageList={pageList} />}
                    {showMessageModal && selectedSaleForMessage && <MessageGeneratorModal apiKey={apiKey} saleData={selectedSaleForMessage} onClose={() => setShowMessageModal(false)} onAlert={showAlert} onToast={showToast} />}
                    {showInvoiceModal && selectedSaleForInvoice && <InvoiceModal saleData={selectedSaleForInvoice} logo={logo} onClose={() => setShowInvoiceModal(false)} onToast={showToast} onAlert={showAlert} />}
                </div>
            );
        }

        const App = () => {
            const defaultUser = { userId: 'local_user', name: 'Admin' };
            return <SalesSystem currentUser={defaultUser} onLogout={() => { }} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
